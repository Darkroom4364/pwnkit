name: Argus Benchmark

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scan mode: black-box or white-box'
        required: false
        default: 'black-box'
        type: choice
        options:
          - black-box
          - white-box
      limit:
        description: 'Number of challenges to run'
        required: false
        default: '60'
      start:
        description: 'Start offset (skip first N challenges)'
        required: false
        default: '0'
      only:
        description: 'Comma-separated challenge IDs to run (e.g. "APEX-001-25,APEX-010-25")'
        required: false
        default: ''
      fresh:
        description: 'Start from clean results instead of merging'
        required: false
        default: 'true'
      benchmark_repo:
        description: 'Argus benchmark source repo (owner/repo or full git URL)'
        required: false
        default: '0ca/argus-validation-benchmarks-patched'
      benchmark_ref:
        description: 'Optional branch/tag/sha inside benchmark_repo'
        required: false
        default: ''

jobs:
  argus:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      ARGUS_PATH: /tmp/argus-benchmarks
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_BASE_URL: ${{ secrets.AZURE_OPENAI_BASE_URL }}
      AZURE_OPENAI_MODEL: ${{ secrets.AZURE_OPENAI_MODEL }}
      AZURE_OPENAI_WIRE_API: ${{ secrets.AZURE_OPENAI_WIRE_API }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: corepack enable && corepack prepare pnpm@9 --activate

      - name: Clone Argus validation benchmarks
        run: |
          BENCHMARK_REPO="${{ inputs.benchmark_repo || '0ca/argus-validation-benchmarks-patched' }}"
          BENCHMARK_REF="${{ inputs.benchmark_ref || '' }}"

          if [[ "$BENCHMARK_REPO" =~ ^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$ ]]; then
            BENCHMARK_URL="https://github.com/${BENCHMARK_REPO}.git"
          else
            BENCHMARK_URL="$BENCHMARK_REPO"
          fi

          echo "Cloning Argus: $BENCHMARK_URL${BENCHMARK_REF:+ @ $BENCHMARK_REF}"
          if [ -n "$BENCHMARK_REF" ]; then
            git clone --depth 1 --branch "$BENCHMARK_REF" "$BENCHMARK_URL" "$ARGUS_PATH"
          else
            git clone --depth 1 "$BENCHMARK_URL" "$ARGUS_PATH"
          fi

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Install pentest tools
        run: |
          npm install -g playwright 2>/dev/null || true
          playwright install --with-deps chromium 2>/dev/null || echo "Playwright install skipped"

          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            sqlmap nmap nikto gobuster dirb ffuf \
            hydra whatweb wafw00f \
            netcat-openbsd dnsutils \
            python3-pip python3-requests jq \
            seclists 2>/dev/null || echo "Some packages failed"

          pip3 install --quiet --break-system-packages \
            requests beautifulsoup4 lxml 2>/dev/null || true

      - name: Run Argus benchmark
        run: |
          MODE="${{ inputs.mode || 'black-box' }}"
          LIMIT="${{ inputs.limit || '60' }}"
          START="${{ inputs.start || '0' }}"
          ONLY="${{ inputs.only || '' }}"
          FRESH="${{ inputs.fresh || 'true' }}"
          START_FLAG=""
          ONLY_FLAG=""
          FRESH_FLAG=""
          if [ "$START" != "0" ]; then START_FLAG="--start $START"; fi
          if [ -n "$ONLY" ]; then ONLY_FLAG="--only $ONLY"; fi
          if [ "$FRESH" = "true" ]; then FRESH_FLAG="--fresh"; fi

          if [ "$MODE" = "white-box" ]; then
            echo "Running WHITE-BOX Argus benchmark... (start=$START, limit=$LIMIT)"
            pnpm --filter @pwnkit/benchmark argus --agentic --white-box --save-findings --limit "$LIMIT" --retries 3 $START_FLAG $ONLY_FLAG $FRESH_FLAG
          else
            echo "Running BLACK-BOX Argus benchmark... (start=$START, limit=$LIMIT)"
            pnpm --filter @pwnkit/benchmark argus --agentic --save-findings --limit "$LIMIT" --retries 3 $START_FLAG $ONLY_FLAG $FRESH_FLAG
          fi
        timeout-minutes: 330

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: argus-results-${{ inputs.mode || 'black-box' }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: packages/benchmark/results/argus-latest.json

      - name: Post summary
        if: always()
        run: |
          RESULTS="packages/benchmark/results/argus-latest.json"
          if [ ! -f "$RESULTS" ]; then
            echo "### Argus Benchmark" >> "$GITHUB_STEP_SUMMARY"
            echo "No results file produced." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          TOTAL=$(jq '.results | length' "$RESULTS")
          FLAGS=$(jq '[.results[] | select(.flagFound == true)] | length' "$RESULTS")
          BUILT=$(jq '[.results[] | select(.error == null or .error == "")] | length' "$RESULTS")
          BUILD_FAIL=$((TOTAL - BUILT))
          echo "### Argus Benchmark Results (${{ inputs.mode || 'black-box' }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total challenges | $TOTAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Flags extracted | $FLAGS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker build failures | $BUILD_FAIL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Score (flags / buildable)** | **$FLAGS / $BUILT** |" >> "$GITHUB_STEP_SUMMARY"
