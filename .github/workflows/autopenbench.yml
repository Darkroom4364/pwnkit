name: AutoPenBench Benchmark

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of tasks to run (max 33)'
        required: false
        default: '33'
      only:
        description: 'Comma-separated target IDs (e.g. "in-vitro_access_control_vm0,real-world_cve_vm6")'
        required: false
        default: ''
      features:
        description: 'Feature flags: "all" (default), "none" (baseline), or "experimental"'
        required: false
        default: 'all'
  schedule:
    # Weekly on Sunday at 06:00 UTC
    - cron: "0 6 * * 0"

jobs:
  autopenbench:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      # The runner defaults to /tmp/auto-pen-bench — keep these in sync.
      AUTOPENBENCH_PATH: /tmp/auto-pen-bench
      # Azure OpenAI is the primary runtime for pwnkit benchmarks.
      # Do NOT set OPENROUTER_API_KEY here — pwnkit prioritizes OpenRouter
      # over Azure when both are present, which would route benchmark
      # traffic to OpenRouter instead of our Azure deployment.
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_BASE_URL: ${{ secrets.AZURE_OPENAI_BASE_URL }}
      AZURE_OPENAI_MODEL: ${{ secrets.AZURE_OPENAI_MODEL }}
      AZURE_OPENAI_WIRE_API: ${{ secrets.AZURE_OPENAI_WIRE_API }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: corepack enable && corepack prepare pnpm@9 --activate

      - name: Clone AutoPenBench repository
        run: git clone --depth 1 https://github.com/lucagioacchini/auto-pen-bench "$AUTOPENBENCH_PATH"

      - name: Install docker-compose v1 shim
        run: |
          # AutoPenBench's Makefile uses the legacy `docker-compose` (hyphen)
          # command. GitHub Actions runners only ship `docker compose` (subcommand).
          # Create a thin shim so the existing Makefile works unmodified.
          sudo tee /usr/local/bin/docker-compose > /dev/null <<'SHIM'
          #!/bin/bash
          exec docker compose "$@"
          SHIM
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose version

      - name: Patch AutoPenBench Dockerfiles (deprecated base images)
        run: |
          # AutoPenBench's upstream Dockerfiles reference base images that
          # have been removed from Docker Hub or are otherwise problematic:
          #
          #   openjdk:8-jre        — REMOVED from Docker Hub (vm6)
          #   openjdk:8u102-jre    — REMOVED from Docker Hub (vm7)
          #   openjdk:17.0.2-slim  — openjdk/* namespace deprecated (vm0)
          #
          # eclipse-temurin is the official Adoptium replacement for the
          # openjdk Docker library images. We sed-substitute in place
          # rather than fork the repo so the patch is visible in CI logs.
          #
          # Issue #60: kali/Dockerfile pins kali-archive-keyring_2025.1
          # which has been removed from http.kali.org (wget exits 8).
          # Replace the manual .deb download with `apt-get install` so
          # apt always pulls whatever the current package version is.
          #
          # Issue #62: The base Kali image ships an expired GPG keyring,
          # so even `apt-get update` fails signature verification (missing
          # key ED65462EC8D5E4C5). We must use --allow-insecure-repositories
          # for the initial `apt-get update` that fetches the new keyring
          # package, then do a proper signed update afterward.
          # If kali_master fails to build, every target is unreachable
          # because the agent SSHes into it as its attacker workstation.
          set -e
          PATCHED=()
          patch_file() {
            local f="$1" before after
            before=$(sha1sum "$f" | cut -d' ' -f1)
            sed -i \
              -e 's|^FROM openjdk:8-jre$|FROM eclipse-temurin:8-jre|' \
              -e 's|^FROM openjdk:8-jre |FROM eclipse-temurin:8-jre |' \
              -e 's|^FROM openjdk:8u102-jre$|FROM eclipse-temurin:8-jre|' \
              -e 's|^FROM openjdk:8u102-jre |FROM eclipse-temurin:8-jre |' \
              -e 's|^FROM openjdk:17.0.2-slim$|FROM eclipse-temurin:17-jre|' \
              -e 's|^FROM openjdk:17.0.2-slim |FROM eclipse-temurin:17-jre |' \
              -e 's|^FROM openjdk:8|FROM eclipse-temurin:8|' \
              "$f"
            perl -0pi -e 's{RUN wget -q https://http\.kali\.org/pool/main/k/kali-archive-keyring/kali-archive-keyring_[^\n]+?\.deb \\\n\s*&& dpkg -i [^\n]+ \\\n\s*&& rm [^\n]+\n}{RUN apt-get update --allow-insecure-repositories \\\n    \&\& DEBIAN_FRONTEND=noninteractive apt-get install -y --allow-unauthenticated --no-install-recommends kali-archive-keyring \\\n    \&\& apt-get update\n}gms' "$f"
            after=$(sha1sum "$f" | cut -d' ' -f1)
            if [ "$before" != "$after" ]; then
              PATCHED+=("$f")
            fi
          }

          while IFS= read -r -d '' df; do
            patch_file "$df"
          done < <(find "$AUTOPENBENCH_PATH" -name Dockerfile -print0)

          echo "=== Patched Dockerfiles ==="
          if [ ${#PATCHED[@]} -eq 0 ]; then
            echo "(none — upstream may have updated)"
          else
            for f in "${PATCHED[@]}"; do
              echo "  - ${f#$AUTOPENBENCH_PATH/}"
              grep '^FROM' "$f" | sed 's/^/      /'
            done
          fi

          echo ""
          echo "=== All FROM lines after patching ==="
          find "$AUTOPENBENCH_PATH" -name Dockerfile -exec grep -H '^FROM' {} \; | sed "s|$AUTOPENBENCH_PATH/||"

      - name: Create kali tmp_script volume directory
        run: |
          # AutoPenBench's setup.sh creates this, but we skip setup.sh.
          # The kali_master compose service mounts it as a bind volume,
          # so it must exist before `docker compose up`.
          mkdir -p "$AUTOPENBENCH_PATH/benchmark/machines/kali/tmp_script"

      - name: Build AutoPenBench Docker images (per-service tolerant)
        run: |
          cd "$AUTOPENBENCH_PATH"
          # AutoPenBench's Makefile builds 33 images via docker-compose
          # build. BuildKit aborts on the first failure, so 'make build || true'
          # leaves us with zero built images when openjdk:8-jre or any other
          # deprecated upstream image fails.
          #
          # Workaround: enumerate every service across every compose file and
          # build them individually so failures don't cascade.
          export DOCKER_BUILDKIT=1
          export BUILDKIT_PROGRESS=plain

          BASE_COMPOSE="benchmark/machines/docker-compose.yml"
          CATEGORY_COMPOSE_FILES=(
            benchmark/machines/in-vitro/cryptography/docker-compose.yml
            benchmark/machines/in-vitro/access_control/docker-compose.yml
            benchmark/machines/in-vitro/web_security/docker-compose.yml
            benchmark/machines/in-vitro/network_security/docker-compose.yml
            benchmark/machines/real-world/cve/docker-compose.yml
          )

          BUILT=0
          FAILED=0

          # Build kali_master from the base compose first
          echo "::group::Building kali_master"
          if docker compose -f "$BASE_COMPOSE" build kali_master 2>&1; then
            BUILT=$((BUILT + 1))
            echo "::endgroup::"
          else
            FAILED=$((FAILED + 1))
            echo "::endgroup::"
            echo "::error::kali_master failed to build — all tasks will fail (agent SSHes into it)"
          fi

          # Build each category's services. Category compose files use
          # relative build contexts (e.g. ./in-vitro/access_control/vm0)
          # that are designed to resolve from benchmark/machines/ — the
          # base compose file's directory. Without -f $BASE_COMPOSE first,
          # Docker Compose resolves paths from the category file's own
          # directory, which gives a wrong (double-nested) path.
          for cf in "${CATEGORY_COMPOSE_FILES[@]}"; do
            [ -f "$cf" ] || continue
            # List services using the merged config
            SERVICES=$(docker compose -f "$BASE_COMPOSE" -f "$cf" config --services 2>/dev/null || true)
            for svc in $SERVICES; do
              # Skip kali_master — already built above
              [ "$svc" = "kali_master" ] && continue
              echo "::group::Building $svc"
              if docker compose -f "$BASE_COMPOSE" -f "$cf" build "$svc" 2>&1; then
                BUILT=$((BUILT + 1))
                echo "::endgroup::"
              else
                FAILED=$((FAILED + 1))
                echo "::endgroup::"
                echo "::warning::Service $svc failed to build (likely deprecated upstream image)"
              fi
            done
          done

          echo ""
          echo "=== Build summary ==="
          echo "  Built:  $BUILT services"
          echo "  Failed: $FAILED services"
          echo ""
          echo "=== Built AutoPenBench images ==="
          docker images --format '{{.Repository}}:{{.Tag}}' | grep -iE 'penbench|pen-bench|in-vitro|real-world' | head -40 || echo "(no images)"
        timeout-minutes: 90

      - name: Compute working AutoPenBench targets (issue #61)
        run: |
          # Issue #61 (Option C): rather than running all 33 tasks and
          # taking 0/33 because some images failed to build, enumerate
          # which images actually exist and pass that as --only to the
          # runner. AutoPenBench's docker-compose service name, image
          # name, and games.json `target` field are all identical
          # (e.g. "in-vitro_access_control_vm0"), so the mapping is
          # the identity function.
          set -e
          GAMES="$AUTOPENBENCH_PATH/data/games.json"
          if [ ! -f "$GAMES" ]; then
            echo "::warning::games.json missing — skipping target filter"
            echo "AUTOPENBENCH_WORKING_TARGETS=" >> "$GITHUB_ENV"
            exit 0
          fi

          ALL_TARGETS=$(jq -r '
            [.. | objects | select(.target?) | .target] | .[]
          ' "$GAMES" | sort -u)

          BUILT_IMAGES=$(docker images --format '{{.Repository}}' | sort -u)

          WORKING=()
          MISSING=()
          for t in $ALL_TARGETS; do
            if echo "$BUILT_IMAGES" | grep -Fxq "$t"; then
              WORKING+=("$t")
            else
              MISSING+=("$t")
            fi
          done

          echo "=== AutoPenBench target build status ==="
          echo "Built (${#WORKING[@]}):"
          for t in "${WORKING[@]}"; do echo "  + $t"; done
          echo "Missing (${#MISSING[@]}):"
          for t in "${MISSING[@]}"; do echo "  - $t"; done

          # Comma-join into env var consumed by the runner step.
          IFS=','; WORKING_CSV="${WORKING[*]}"; unset IFS
          echo "AUTOPENBENCH_WORKING_TARGETS=$WORKING_CSV" >> "$GITHUB_ENV"

          {
            echo "### AutoPenBench target build filter"
            echo ""
            echo "- Built: **${#WORKING[@]}** / $(echo "$ALL_TARGETS" | wc -l | tr -d ' ')"
            echo "- Skipped (build failed): **${#MISSING[@]}**"
          } >> "$GITHUB_STEP_SUMMARY"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Install pentest tools
        run: |
          # Full pentest toolset — give the agent every weapon BoxPwnr has.
          # Installed directly on the Ubuntu runner. AutoPenBench tasks SSH
          # into a Kali container which already ships with Kali tools, but
          # we still install host-side tools so the agent's bash calls
          # outside SSH have a usable environment.
          sudo apt-get update -qq
          # Try to install everything in one shot. If that fails (one bad
          # package can poison the whole transaction in -qq mode), fall back
          # to per-package install so we get partial coverage.
          if ! sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            sqlmap nmap nikto \
            gobuster dirb wfuzz ffuf \
            hydra john hashcat \
            whatweb wafw00f \
            nbtscan smbclient \
            netcat-openbsd dnsutils \
            sshpass openssh-client \
            python3-pip python3-requests \
            jq xmlstarlet \
            seclists; then
            echo "::warning::Bulk apt install failed — falling back to per-package install"
            for pkg in sqlmap nmap nikto gobuster dirb wfuzz ffuf hydra john hashcat whatweb wafw00f nbtscan smbclient netcat-openbsd dnsutils sshpass openssh-client python3-pip python3-requests jq xmlstarlet seclists; do
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq "$pkg" || echo "  ✗ $pkg failed"
            done
          fi

          pip3 install --quiet --break-system-packages \
            requests beautifulsoup4 lxml \
            paramiko impacket 2>/dev/null || echo "Some Python packages failed"

          echo "=== Installed pentest tools ==="
          for tool in sqlmap nmap nikto gobuster dirb wfuzz ffuf hydra john hashcat whatweb wafw00f curl wget python3 jq sshpass; do
            if command -v $tool >/dev/null 2>&1; then
              echo "  ✓ $tool"
            else
              echo "  ✗ $tool (missing)"
            fi
          done

      - name: Configure feature flags
        run: |
          FEATURES="${{ inputs.features || 'all' }}"
          if [ "$FEATURES" = "none" ]; then
            echo "PWNKIT_FEATURE_EARLY_STOP=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_LOOP_DETECTION=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_CONTEXT_COMPACTION=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_SCRIPT_TEMPLATES=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_DYNAMIC_PLAYBOOKS=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_EXTERNAL_MEMORY=0" >> "$GITHUB_ENV"
            echo "Running with ALL features DISABLED (baseline)"
          elif [ "$FEATURES" = "experimental" ]; then
            echo "PWNKIT_FEATURE_DYNAMIC_PLAYBOOKS=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_EXTERNAL_MEMORY=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_PROGRESS_HANDOFF=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_WEB_SEARCH=1" >> "$GITHUB_ENV"
            echo "Running with ALL features including experimental"
          else
            echo "Running with default features (stable improvements ON, experimental OFF)"
          fi

      - name: Run AutoPenBench benchmark
        run: |
          LIMIT="${{ inputs.limit || '33' }}"
          ONLY="${{ inputs.only || '' }}"
          # Manual `only` input wins; otherwise fall back to the auto-computed
          # working-targets list from the build filter step (issue #61).
          if [ -z "$ONLY" ] && [ -n "${AUTOPENBENCH_WORKING_TARGETS:-}" ]; then
            ONLY="$AUTOPENBENCH_WORKING_TARGETS"
            echo "Auto-filtering to ${AUTOPENBENCH_WORKING_TARGETS} (working targets only)"
          fi
          ONLY_FLAG=""
          if [ -n "$ONLY" ]; then
            ONLY_FLAG="--only $ONLY"
          fi
          echo "Running AutoPenBench... (limit=$LIMIT, only=$ONLY)"
          # The runner persists results to packages/benchmark/results/autopenbench-latest.json
          # on its own — no stdout capture needed.
          pnpm --filter @pwnkit/benchmark autopenbench --limit "$LIMIT" --retries 3 --save-findings $ONLY_FLAG
        timeout-minutes: 330

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autopenbench-results-${{ inputs.features || 'all' }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: packages/benchmark/results/autopenbench-latest.json

      - name: Post summary
        if: always()
        run: |
          RESULTS="packages/benchmark/results/autopenbench-latest.json"
          if [ ! -f "$RESULTS" ]; then
            echo "### AutoPenBench Benchmark" >> "$GITHUB_STEP_SUMMARY"
            echo "No results file produced." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          TOTAL=$(jq '.tasks // (.results | length)' "$RESULTS")
          FLAGS=$(jq '.flags // ([.results[] | select(.flagFound == true)] | length)' "$RESULTS")
          ERRORS=$(jq '[.results[] | select(.error != null and .error != "")] | length' "$RESULTS")
          PCT=$(awk "BEGIN { if ($TOTAL > 0) printf \"%.1f\", ($FLAGS / $TOTAL) * 100; else print \"0.0\" }")
          echo "### AutoPenBench Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total tasks | $TOTAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Flags captured | $FLAGS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Task errors | $ERRORS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Score** | **$FLAGS / $TOTAL = $PCT%** |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Bar to beat:** 21% (original AutoPenBench paper)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### By category" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Category | Flags / Total |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|---------------|" >> "$GITHUB_STEP_SUMMARY"
          jq -r '.results | group_by(.level + "/" + .category) | .[] | "| \(.[0].level)/\(.[0].category) | \([.[] | select(.flagFound)] | length) / \(length) |"' "$RESULTS" >> "$GITHUB_STEP_SUMMARY"
