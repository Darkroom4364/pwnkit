name: BountyBench Benchmark

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of bounties to run'
        required: false
        default: '40'
      start:
        description: 'Start offset (skip first N bounties)'
        required: false
        default: '0'
      only:
        description: 'Comma-separated bounty IDs to run (e.g. "lunary__0,gradio__1")'
        required: false
        default: ''
      task_type:
        description: 'Filter by task type: detect, exploit, patch, or all'
        required: false
        default: 'all'
      retries:
        description: 'Retry count per bounty'
        required: false
        default: '3'
      fresh:
        description: 'Start from a clean bountybench-latest.json instead of merging'
        required: false
        default: 'true'
      model:
        description: 'Model string for BountyBench harness (e.g. anthropic/claude-3-5-sonnet-20241022)'
        required: false
        default: 'anthropic/claude-3-5-sonnet-20241022'
      phase_iterations:
        description: 'Number of phase iterations (retry count inside the harness)'
        required: false
        default: '3'

jobs:
  bountybench:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      BOUNTYBENCH_PATH: /tmp/bountybench
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_BASE_URL: ${{ secrets.AZURE_OPENAI_BASE_URL }}
      AZURE_OPENAI_MODEL: ${{ secrets.AZURE_OPENAI_MODEL }}
      AZURE_OPENAI_WIRE_API: ${{ secrets.AZURE_OPENAI_WIRE_API }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: corepack enable && corepack prepare pnpm@9 --activate

      - name: Clone BountyBench
        run: |
          git clone --depth 1 --recurse-submodules https://github.com/bountybench/bountybench "$BOUNTYBENCH_PATH"
          cd "$BOUNTYBENCH_PATH"
          # Try to init submodules via HTTPS, tolerating failures on private repos
          git submodule update --init --depth 1 --jobs 4 2>&1 || true

      - name: Install BountyBench Python dependencies
        run: |
          cd "$BOUNTYBENCH_PATH"
          pip install -r requirements.txt

      - name: Pull BountyBench Docker images
        run: |
          docker pull cybench/bountyagent:latest || echo "Failed to pull bountyagent image — harness may build it"

      - name: Ensure Docker socket is accessible
        run: |
          sudo chmod 666 /var/run/docker.sock || true
          docker info

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Run BountyBench benchmark
        run: |
          LIMIT="${{ inputs.limit || '40' }}"
          START="${{ inputs.start || '0' }}"
          ONLY="${{ inputs.only || '' }}"
          TASK_TYPE="${{ inputs.task_type || 'all' }}"
          RETRIES="${{ inputs.retries || '3' }}"
          FRESH="${{ inputs.fresh || 'true' }}"
          MODEL="${{ inputs.model || 'anthropic/claude-3-5-sonnet-20241022' }}"
          PHASE_ITERATIONS="${{ inputs.phase_iterations || '3' }}"
          START_FLAG=""
          ONLY_FLAG=""
          FRESH_FLAG=""
          TASK_FLAG=""
          if [ "$START" != "0" ]; then
            START_FLAG="--start $START"
          fi
          if [ -n "$ONLY" ]; then
            ONLY_FLAG="--only $ONLY"
          fi
          if [ "$FRESH" = "true" ]; then
            FRESH_FLAG="--fresh"
          fi
          if [ "$TASK_TYPE" != "all" ]; then
            TASK_FLAG="--task-type $TASK_TYPE"
          fi
          echo "Running BountyBench benchmark... (start=$START, limit=$LIMIT, only=$ONLY, task=$TASK_TYPE, retries=$RETRIES, fresh=$FRESH, model=$MODEL)"
          pnpm --filter @pwnkit/benchmark bountybench --limit "$LIMIT" --retries "$RETRIES" --model "$MODEL" --phase-iterations "$PHASE_ITERATIONS" $START_FLAG $ONLY_FLAG $FRESH_FLAG $TASK_FLAG
        timeout-minutes: 330

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bountybench-results-${{ inputs.task_type || 'all' }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            packages/benchmark/results/bountybench-latest.json
            packages/benchmark/results/bountybench-incremental.jsonl

      - name: Post summary
        if: always()
        run: |
          RESULTS="packages/benchmark/results/bountybench-latest.json"
          if [ ! -f "$RESULTS" ]; then
            echo "### BountyBench Benchmark" >> "$GITHUB_STEP_SUMMARY"
            echo "No results file produced." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          TOTAL=$(jq '.results | length' "$RESULTS")
          PASSED=$(jq '[.results[] | select(.passed == true)] | length' "$RESULTS")
          EARNED=$(jq '.earnedBountyValueUsd' "$RESULTS")
          AVAILABLE=$(jq '.totalBountyValueUsd' "$RESULTS")
          MODEL=$(jq -r '.model' "$RESULTS")
          ERRORS=$(jq '.harnessErrors' "$RESULTS")

          echo "### BountyBench Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Model | $MODEL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total bounties | $TOTAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Passed | $PASSED |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Bounty earned** | **\$$EARNED / \$$AVAILABLE** |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Harness errors | $ERRORS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Score (passed / total)** | **$PASSED / $TOTAL** |" >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### By Task Type" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Task | Passed | Earned |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|--------|" >> "$GITHUB_STEP_SUMMARY"
          for TASK in detect exploit patch; do
            T_TOTAL=$(jq "[.results[] | select(.taskType == \"$TASK\")] | length" "$RESULTS")
            T_PASSED=$(jq "[.results[] | select(.taskType == \"$TASK\" and .passed == true)] | length" "$RESULTS")
            T_EARNED=$(jq "[.results[] | select(.taskType == \"$TASK\" and .passed == true)] | map(.bountyUsd) | add // 0" "$RESULTS")
            echo "| $TASK | $T_PASSED / $T_TOTAL | \$$T_EARNED |" >> "$GITHUB_STEP_SUMMARY"
          done
