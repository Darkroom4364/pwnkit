name: BountyBench Benchmark

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of bounties to run'
        required: false
        default: '40'
      start:
        description: 'Start offset (skip first N bounties)'
        required: false
        default: '0'
      only:
        description: 'Comma-separated bounty IDs to run (e.g. "lunary__1,gradio__1")'
        required: false
        default: ''
      task_type:
        description: 'Filter by task type: detect, exploit, patch, or all'
        required: false
        default: 'all'
      retries:
        description: 'Retry count per bounty'
        required: false
        default: '3'
      fresh:
        description: 'Start from a clean bountybench-latest.json instead of merging'
        required: false
        default: 'true'
      features:
        description: 'Feature flags: "all" (default), "none" (baseline), or "playbooks,memory" (specific)'
        required: false
        default: 'all'

jobs:
  bountybench:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      BOUNTYBENCH_PATH: /tmp/bountybench
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_BASE_URL: ${{ secrets.AZURE_OPENAI_BASE_URL }}
      AZURE_OPENAI_MODEL: ${{ secrets.AZURE_OPENAI_MODEL }}
      AZURE_OPENAI_WIRE_API: ${{ secrets.AZURE_OPENAI_WIRE_API }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: corepack enable && corepack prepare pnpm@9 --activate

      - name: Clone BountyBench
        run: |
          # Clone without submodules first — some bountytasks codebases reference
          # private repos via SSH that CI can't access. The runner handles missing
          # codebases gracefully (skips them).
          git clone --depth 1 https://github.com/bountybench/bountybench "$BOUNTYBENCH_PATH"
          cd "$BOUNTYBENCH_PATH"
          # Try to init submodules via HTTPS, tolerating failures on private repos
          git submodule update --init --depth 1 --jobs 4 2>&1 || true

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Install pentest tools
        run: |
          npm install -g playwright 2>/dev/null || true
          playwright install --with-deps chromium 2>/dev/null || echo "Playwright install skipped"

          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            sqlmap nmap nikto \
            gobuster dirb wfuzz ffuf \
            hydra john hashcat \
            whatweb wafw00f \
            netcat-openbsd dnsutils \
            python3-pip python3-requests \
            jq xmlstarlet \
            seclists 2>/dev/null || echo "Some packages failed (check apt log)"

          pip3 install --quiet --break-system-packages \
            requests beautifulsoup4 lxml \
            pwntools pycryptodome 2>/dev/null || echo "Some Python packages failed"

      - name: Configure feature flags
        run: |
          FEATURES="${{ inputs.features || 'all' }}"
          if [ "$FEATURES" = "none" ]; then
            echo "PWNKIT_FEATURE_EARLY_STOP=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_LOOP_DETECTION=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_CONTEXT_COMPACTION=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_SCRIPT_TEMPLATES=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_DYNAMIC_PLAYBOOKS=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_EXTERNAL_MEMORY=0" >> "$GITHUB_ENV"
            echo "Running with ALL features DISABLED (baseline)"
          elif [ "$FEATURES" = "all" ]; then
            echo "Running with default features"
          elif [ "$FEATURES" = "experimental" ]; then
            echo "PWNKIT_FEATURE_DYNAMIC_PLAYBOOKS=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_EXTERNAL_MEMORY=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_PROGRESS_HANDOFF=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_WEB_SEARCH=1" >> "$GITHUB_ENV"
            echo "Running with ALL features including experimental"
          else
            for f in $(echo "$FEATURES" | tr ',' ' '); do
              case "$f" in
                playbooks) echo "PWNKIT_FEATURE_DYNAMIC_PLAYBOOKS=1" >> "$GITHUB_ENV" ;;
                memory) echo "PWNKIT_FEATURE_EXTERNAL_MEMORY=1" >> "$GITHUB_ENV" ;;
                web_search) echo "PWNKIT_FEATURE_WEB_SEARCH=1" >> "$GITHUB_ENV" ;;
                handoff) echo "PWNKIT_FEATURE_PROGRESS_HANDOFF=1" >> "$GITHUB_ENV" ;;
              esac
            done
            echo "Running with features: $FEATURES"
          fi

      - name: Run BountyBench benchmark
        run: |
          LIMIT="${{ inputs.limit || '40' }}"
          START="${{ inputs.start || '0' }}"
          ONLY="${{ inputs.only || '' }}"
          TASK_TYPE="${{ inputs.task_type || 'all' }}"
          RETRIES="${{ inputs.retries || '3' }}"
          FRESH="${{ inputs.fresh || 'true' }}"
          START_FLAG=""
          ONLY_FLAG=""
          FRESH_FLAG=""
          TASK_FLAG=""
          if [ "$START" != "0" ]; then
            START_FLAG="--start $START"
          fi
          if [ -n "$ONLY" ]; then
            ONLY_FLAG="--only $ONLY"
          fi
          if [ "$FRESH" = "true" ]; then
            FRESH_FLAG="--fresh"
          fi
          if [ "$TASK_TYPE" != "all" ]; then
            TASK_FLAG="--task-type $TASK_TYPE"
          fi
          echo "Running BountyBench benchmark... (start=$START, limit=$LIMIT, only=$ONLY, task=$TASK_TYPE, retries=$RETRIES, fresh=$FRESH)"
          pnpm --filter @pwnkit/benchmark bountybench --save-findings --limit "$LIMIT" --retries "$RETRIES" $START_FLAG $ONLY_FLAG $FRESH_FLAG $TASK_FLAG
        timeout-minutes: 330

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bountybench-results-${{ inputs.task_type || 'all' }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            packages/benchmark/results/bountybench-latest.json
            packages/benchmark/results/bountybench-incremental.jsonl

      - name: Post summary
        if: always()
        run: |
          RESULTS="packages/benchmark/results/bountybench-latest.json"
          if [ ! -f "$RESULTS" ]; then
            echo "### BountyBench Benchmark" >> "$GITHUB_STEP_SUMMARY"
            echo "No results file produced." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          TOTAL=$(jq '.results | length' "$RESULTS")
          PASSED=$(jq '[.results[] | select(.passed == true)] | length' "$RESULTS")
          EARNED=$(jq '.earnedBountyValueUsd' "$RESULTS")
          AVAILABLE=$(jq '.totalBountyValueUsd' "$RESULTS")
          STARTED=$(jq '[.results[] | select(.error != "Docker start failed")] | length' "$RESULTS")
          STARTUP_FAIL=$((TOTAL - STARTED))

          echo "### BountyBench Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total bounties | $TOTAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Passed | $PASSED |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Bounty earned** | **\$$EARNED / \$$AVAILABLE** |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker startup failures | $STARTUP_FAIL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Score (passed / started)** | **$PASSED / $STARTED** |" >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### By Task Type" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Task | Passed | Earned |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|--------|" >> "$GITHUB_STEP_SUMMARY"
          for TASK in detect exploit patch; do
            T_TOTAL=$(jq "[.results[] | select(.taskType == \"$TASK\")] | length" "$RESULTS")
            T_PASSED=$(jq "[.results[] | select(.taskType == \"$TASK\" and .passed == true)] | length" "$RESULTS")
            T_EARNED=$(jq "[.results[] | select(.taskType == \"$TASK\" and .passed == true)] | map(.bountyUsd) | add // 0" "$RESULTS")
            echo "| $TASK | $T_PASSED / $T_TOTAL | \$$T_EARNED |" >> "$GITHUB_STEP_SUMMARY"
          done
