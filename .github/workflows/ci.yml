name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt in to running the JavaScript actions (setup-node, checkout, etc.) on
# Node 24 instead of the deprecated Node 20 internals. GitHub will flip the
# default in June 2026; this silences the deprecation annotations today.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@9 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: node dist/pwnkit.js --help
      - run: npm pack --dry-run
        working-directory: dist

  test:
    runs-on: [self-hosted, Linux, X64]
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@9 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run scan + CLI E2E tests
        run: pnpm --filter @pwnkit/test-targets test

  # ── Install-smoke matrix ──────────────────────────────────────────────
  # Guards against runtime/ABI regressions like the better-sqlite3 crash on
  # Node 25 (pre-0.7.1). Installs the built tarball into a clean directory
  # via each supported runtime (Node LTS matrix, Bun, Docker) and runs the
  # shared `scripts/smoke-cli.sh` harness, which exercises every subcommand
  # most likely to silently break: --help, doctor, history (DB init path),
  # mcp-server (stdio JSON-RPC handshake), and review (source pipeline
  # bootstrap against a throwaway tiny repo with a fake API key).

  install-smoke-node:
    name: install-smoke (node ${{ matrix.node }})
    runs-on: [self-hosted, Linux, X64]
    needs: build
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22", "24"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: corepack enable && corepack prepare pnpm@9 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Pack CLI tarball
        run: cd dist && npm pack
      - name: Install tarball into a clean dir
        run: |
          mkdir -p /tmp/smoke && cd /tmp/smoke
          npm init -y >/dev/null
          npm install "$GITHUB_WORKSPACE"/dist/pwnkit-cli-*.tgz
      - name: Runtime smoke (node)
        run: bash "$GITHUB_WORKSPACE/scripts/smoke-cli.sh" "node /tmp/smoke/node_modules/pwnkit-cli/pwnkit.js"

  install-smoke-bun:
    name: install-smoke (bun)
    runs-on: [self-hosted, Linux, X64]
    needs: build
    steps:
      - uses: actions/checkout@v6
      # We still need Node + pnpm to build the bundle; Bun only tests the
      # runtime side of the install.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
      - run: corepack enable && corepack prepare pnpm@9 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Pack CLI tarball
        run: cd dist && npm pack
      - name: Install tarball into a clean dir (bun)
        run: |
          mkdir -p /tmp/smoke-bun && cd /tmp/smoke-bun
          bun init -y >/dev/null
          bun add "$GITHUB_WORKSPACE"/dist/pwnkit-cli-*.tgz
      - name: Runtime smoke (bun)
        run: bash "$GITHUB_WORKSPACE/scripts/smoke-cli.sh" "bun run /tmp/smoke-bun/node_modules/pwnkit-cli/pwnkit.js"

  install-smoke-docker:
    name: install-smoke (docker)
    runs-on: [self-hosted, Linux, X64]
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Build image
        run: docker build -t pwnkit-ci-smoke .
      - name: Runtime smoke (docker)
        # Overrides the image ENTRYPOINT to bash and mounts the smoke
        # harness into the container read-only. The harness itself runs
        # pwnkit-cli inside the container via the CLI arg, so temp files
        # live on container tmpfs and never cross the bind-mount boundary
        # (which is where an earlier iteration tripped over Emscripten VFS
        # permissions on node-sqlite3-wasm writes).
        run: |
          docker run --rm \
            --entrypoint bash \
            -v "$GITHUB_WORKSPACE/scripts":/ci-scripts:ro \
            pwnkit-ci-smoke \
            /ci-scripts/smoke-cli.sh "node /app/dist/pwnkit.js"

  ecosystem-audit-smoke:
    name: ecosystem-audit-smoke (${{ matrix.ecosystem }})
    runs-on: [self-hosted, Linux, X64]
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - ecosystem: npm
            target: lodash
          - ecosystem: pypi
            target: requests
          - ecosystem: cargo
            target: serde
          - ecosystem: oci
            target: alpine:3.20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@9 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Ecosystem audit smoke
        run: bash "$GITHUB_WORKSPACE/scripts/smoke-audit-ecosystems.sh" "${{ matrix.ecosystem }}" "${{ matrix.target }}"

  # Website auto-deploys via Cloudflare Pages Git integration
