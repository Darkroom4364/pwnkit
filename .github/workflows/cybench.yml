name: Cybench Benchmark

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of challenges to run'
        required: false
        default: '40'
      start:
        description: 'Start offset (skip first N challenges)'
        required: false
        default: '0'
      only:
        description: 'Comma-separated challenge IDs to run (e.g. "flag-command,noisier-crc")'
        required: false
        default: ''
      retries:
        description: 'Retry count per challenge'
        required: false
        default: '3'
      fresh:
        description: 'Start from a clean cybench-latest.json instead of merging'
        required: false
        default: 'true'
      features:
        description: 'Feature flags: "all" (default), "none" (baseline), or "playbooks,memory" (specific)'
        required: false
        default: 'all'
  schedule:
    # Weekly on Monday at 04:00 UTC
    - cron: "0 4 * * 1"

jobs:
  cybench:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      CYBENCH_PATH: /tmp/cybench
      # Azure OpenAI is the primary runtime for Cybench benchmarks.
      # Do NOT set OPENROUTER_API_KEY here — pwnkit prioritizes OpenRouter
      # over Azure when both are present, which would route benchmark
      # traffic to OpenRouter instead of our Azure deployment.
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_BASE_URL: ${{ secrets.AZURE_OPENAI_BASE_URL }}
      AZURE_OPENAI_MODEL: ${{ secrets.AZURE_OPENAI_MODEL }}
      AZURE_OPENAI_WIRE_API: ${{ secrets.AZURE_OPENAI_WIRE_API }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - run: corepack enable && corepack prepare pnpm@9 --activate

      - name: Clone Cybench (0ca/cybench-patched fork)
        run: |
          # Use 0ca/cybench-patched (same maintainer as our XBOW patched fork).
          # Fixes deprecated Debian Buster repos in Dockerfiles + adds 9 missing
          # LosFuzzys/GlacierCTF2023 challenges that upstream lost.
          git clone --depth 1 --recurse-submodules --shallow-submodules https://github.com/0ca/cybench-patched "$CYBENCH_PATH"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Install pentest tools
        run: |
          # Playwright for web challenges (already in CI image but ensure)
          npm install -g playwright 2>/dev/null || true
          playwright install --with-deps chromium 2>/dev/null || echo "Playwright install skipped"

          # Full pentest toolset — give the agent every weapon BoxPwnr has.
          # Cybench covers web/crypto/pwn/reverse/forensics/misc, so we include
          # binary-analysis tools alongside the web stack.
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            sqlmap nmap nikto \
            gobuster dirb wfuzz ffuf \
            hydra john hashcat \
            whatweb wafw00f \
            nbtscan smbclient \
            netcat-openbsd dnsutils \
            python3-pip python3-requests \
            jq xmlstarlet \
            binutils file xxd \
            radare2 gdb \
            unzip p7zip-full \
            seclists 2>/dev/null || echo "Some packages failed (check apt log)"

          # Python tools the agent might use (covers crypto/pwn/forensics)
          pip3 install --quiet --break-system-packages \
            requests beautifulsoup4 lxml \
            pwntools pycryptodome \
            paramiko impacket 2>/dev/null || echo "Some Python packages failed"

          # Verify what's available
          echo "=== Installed pentest tools ==="
          for tool in sqlmap nmap nikto gobuster ffuf hydra john hashcat curl python3 jq radare2 gdb file xxd; do
            if command -v $tool >/dev/null 2>&1; then
              echo "  ✓ $tool"
            else
              echo "  ✗ $tool (missing)"
            fi
          done

      - name: Configure feature flags
        run: |
          FEATURES="${{ inputs.features || 'all' }}"
          if [ "$FEATURES" = "none" ]; then
            echo "PWNKIT_FEATURE_EARLY_STOP=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_LOOP_DETECTION=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_CONTEXT_COMPACTION=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_SCRIPT_TEMPLATES=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_DYNAMIC_PLAYBOOKS=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_EXTERNAL_MEMORY=0" >> "$GITHUB_ENV"
            echo "Running with ALL features DISABLED (baseline)"
          elif [ "$FEATURES" = "all" ]; then
            echo "Running with default features (stable improvements ON, experimental OFF)"
          elif [ "$FEATURES" = "experimental" ]; then
            echo "PWNKIT_FEATURE_DYNAMIC_PLAYBOOKS=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_EXTERNAL_MEMORY=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_PROGRESS_HANDOFF=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_WEB_SEARCH=1" >> "$GITHUB_ENV"
            echo "Running with ALL features including experimental"
          else
            for f in $(echo "$FEATURES" | tr ',' ' '); do
              case "$f" in
                playbooks) echo "PWNKIT_FEATURE_DYNAMIC_PLAYBOOKS=1" >> "$GITHUB_ENV" ;;
                memory) echo "PWNKIT_FEATURE_EXTERNAL_MEMORY=1" >> "$GITHUB_ENV" ;;
                web_search) echo "PWNKIT_FEATURE_WEB_SEARCH=1" >> "$GITHUB_ENV" ;;
                handoff) echo "PWNKIT_FEATURE_PROGRESS_HANDOFF=1" >> "$GITHUB_ENV" ;;
              esac
            done
            echo "Running with features: $FEATURES"
          fi

      - name: Run Cybench benchmark
        run: |
          LIMIT="${{ inputs.limit || '40' }}"
          START="${{ inputs.start || '0' }}"
          ONLY="${{ inputs.only || '' }}"
          RETRIES="${{ inputs.retries || '3' }}"
          FRESH="${{ inputs.fresh || 'true' }}"
          START_FLAG=""
          ONLY_FLAG=""
          FRESH_FLAG=""
          if [ "$START" != "0" ]; then
            START_FLAG="--start $START"
          fi
          if [ -n "$ONLY" ]; then
            ONLY_FLAG="--only $ONLY"
          fi
          if [ "$FRESH" = "true" ]; then
            FRESH_FLAG="--fresh"
          fi
          echo "Running Cybench benchmark... (start=$START, limit=$LIMIT, only=$ONLY, retries=$RETRIES, fresh=$FRESH)"
          pnpm --filter @pwnkit/benchmark cybench --save-findings --limit "$LIMIT" --retries "$RETRIES" $START_FLAG $ONLY_FLAG $FRESH_FLAG
        timeout-minutes: 330

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cybench-results-${{ inputs.features || 'all' }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: packages/benchmark/results/cybench-latest.json

      - name: Post summary
        if: always()
        run: |
          RESULTS="packages/benchmark/results/cybench-latest.json"
          if [ ! -f "$RESULTS" ]; then
            echo "### Cybench Benchmark" >> "$GITHUB_STEP_SUMMARY"
            echo "No results file produced." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          TOTAL=$(jq '.results | length' "$RESULTS")
          FLAGS=$(jq '[.results[] | select(.flagFound == true)] | length' "$RESULTS")
          STARTED=$(jq '[.results[] | select(.error != "Docker start failed")] | length' "$RESULTS")
          STARTUP_FAIL=$((TOTAL - STARTED))
          echo "### Cybench Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total challenges | $TOTAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Flags extracted | $FLAGS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker startup failures | $STARTUP_FAIL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Score (flags / started)** | **$FLAGS / $STARTED** |" >> "$GITHUB_STEP_SUMMARY"
