name: Publish Kali Docker image

on:
  push:
    branches: [main]
    paths:
      - 'packages/core/docker/Dockerfile.kali'
  workflow_dispatch:
    inputs:
      tag:
        description: Override tag (optional, defaults to "latest")
        required: false
        default: latest

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/core/docker/Dockerfile.kali
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/pwnkit-labs/pwnkit-kali:${{ steps.tag.outputs.value }}
          labels: |
            org.opencontainers.image.title=pwnkit-kali
            org.opencontainers.image.description=Pre-built Kali Linux image for pwnkit benchmark mode
            org.opencontainers.image.source=https://github.com/pwnkit-labs/pwnkit
            org.opencontainers.image.licenses=Apache-2.0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test published image
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/pwnkit-labs/pwnkit-kali:${{ steps.tag.outputs.value }}"
          docker pull "$IMAGE"
          # Exec every new tool (and representative old ones) as the non-root
          # pentester user. Any failure fails the job so broken tool additions
          # can't silently ship.
          docker run --rm --entrypoint bash "$IMAGE" -c '
            set -e
            echo "=== whoami ===" && whoami
            echo "=== nmap ==="        && nmap --version | head -1
            echo "=== sqlmap ==="      && sqlmap --version
            echo "=== gdb ==="         && gdb --version | head -1
            echo "=== gdb-multiarch ===" && gdb-multiarch --version | head -1
            echo "=== radare2 ==="     && r2 -v | head -1
            echo "=== binwalk ==="     && binwalk --help 2>&1 | head -1
            echo "=== foremost ==="    && foremost -V 2>&1 | head -1 || true
            echo "=== exiftool ==="    && exiftool -ver
            echo "=== ltrace ==="      && ltrace -V | head -1
            echo "=== strace ==="      && strace -V | head -1
            echo "=== file ==="        && file --version | head -1
            echo "=== objdump ==="     && objdump --version | head -1
            echo "=== ROPgadget ==="   && ROPgadget --help 2>&1 | head -1
            echo "=== python pwntools ===" && python3 -c "from pwn import context; print(\"pwntools ok\")"
            echo "=== python requests ===" && python3 -c "import requests, bs4; print(\"py deps ok\")"
            echo "ALL_TOOLS_OK"
          '
