name: Publish Kali Docker image

on:
  push:
    branches: [main]
    paths:
      - 'packages/core/docker/Dockerfile.kali'
  workflow_dispatch:
    inputs:
      tag:
        description: Override tag (optional, defaults to "latest")
        required: false
        default: latest

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/core/docker/Dockerfile.kali
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/pwnkit-labs/pwnkit-kali:${{ steps.tag.outputs.value }}
          labels: |
            org.opencontainers.image.title=pwnkit-kali
            org.opencontainers.image.description=Pre-built Kali Linux image for pwnkit benchmark mode
            org.opencontainers.image.source=https://github.com/pwnkit-labs/pwnkit
            org.opencontainers.image.licenses=Apache-2.0
          cache-from: type=gha
          cache-to: type=gha,mode=max
