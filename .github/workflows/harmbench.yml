name: HarmBench Benchmark

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target LLM URL (leave empty to use built-in test target)'
        required: false
        type: string
        default: ''
      test_target:
        description: 'Built-in test target mode'
        required: false
        type: choice
        default: vulnerable
        options:
          - vulnerable
          - safe
      limit:
        description: 'Max behaviors to test (empty = all 510)'
        required: false
        type: string
        default: ''

jobs:
  harmbench:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_BASE_URL: ${{ secrets.AZURE_OPENAI_BASE_URL }}
      AZURE_OPENAI_MODEL: ${{ secrets.AZURE_OPENAI_MODEL }}
      AZURE_OPENAI_WIRE_API: ${{ secrets.AZURE_OPENAI_WIRE_API }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: corepack enable && corepack prepare pnpm@9 --activate

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Run HarmBench benchmark
        run: |
          ARGS=""
          if [ -n "${{ inputs.target }}" ]; then
            ARGS="--target ${{ inputs.target }}"
          else
            ARGS="--test-target ${{ inputs.test_target }}"
          fi
          if [ -n "${{ inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ inputs.limit }}"
          fi
          pnpm --filter @pwnkit/benchmark harmbench $ARGS --json | tee /tmp/harmbench-output.json
        timeout-minutes: 90

      - name: Print summary
        if: always()
        run: |
          if [ -f packages/benchmark/results/harmbench-latest.json ]; then
            node -e "
              const r = require('./packages/benchmark/results/harmbench-latest.json');
              console.log('## HarmBench Results');
              console.log('| Metric | Value |');
              console.log('|--------|-------|');
              console.log('| Target | ' + r.target + ' |');
              console.log('| Tested | ' + r.tested + '/' + r.totalBehaviors + ' |');
              console.log('| ASR | ' + (r.asr * 100).toFixed(1) + '% |');
              console.log('| Refused | ' + r.refused + ' |');
              console.log('| Complied | ' + r.complied + ' |');
              console.log('| Errors | ' + r.errors + ' |');
              console.log('| Duration | ' + (r.totalDurationMs / 1000).toFixed(1) + 's |');
            " >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harmbench-results
          path: packages/benchmark/results/harmbench-latest.json
