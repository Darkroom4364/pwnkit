name: HackTheBox Starting Point Benchmark

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of machines to run'
        required: false
        default: '25'
      start:
        description: 'Start offset (skip first N machines)'
        required: false
        default: '0'
      only:
        description: 'Comma-separated machine names (e.g. "meow,fawn,dancing")'
        required: false
        default: ''
      tier:
        description: 'Filter by tier (1, 2, or 3). Leave empty for all.'
        required: false
        default: ''
      retries:
        description: 'Retry count per machine'
        required: false
        default: '3'
      fresh:
        description: 'Start from a clean htb-latest.json instead of merging'
        required: false
        default: 'true'

jobs:
  htb:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      HTB_API_TOKEN: ${{ secrets.HTB_API_TOKEN }}
      # Azure OpenAI is the primary runtime.
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_BASE_URL: ${{ secrets.AZURE_OPENAI_BASE_URL }}
      AZURE_OPENAI_MODEL: ${{ secrets.AZURE_OPENAI_MODEL }}
      AZURE_OPENAI_WIRE_API: ${{ secrets.AZURE_OPENAI_WIRE_API }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: corepack enable && corepack prepare pnpm@9 --activate

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Install pentest tools
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            nmap nikto sqlmap \
            gobuster dirb ffuf \
            hydra john \
            whatweb wafw00f \
            nbtscan smbclient \
            netcat-openbsd dnsutils \
            python3-pip python3-requests \
            jq seclists 2>/dev/null || echo "Some packages failed"

          pip3 install --quiet --break-system-packages \
            requests beautifulsoup4 lxml \
            pwntools paramiko impacket 2>/dev/null || echo "Some Python packages failed"

      - name: Connect to HTB VPN
        run: |
          # Requires HTB_OVPN_CONFIG secret containing the .ovpn file contents
          if [ -z "${{ secrets.HTB_OVPN_CONFIG }}" ]; then
            echo "::warning::HTB_OVPN_CONFIG secret not set — VPN connection skipped."
            echo "Set the secret to your .ovpn file contents from HTB to enable VPN."
            exit 0
          fi
          sudo apt-get install -y -qq openvpn
          echo "${{ secrets.HTB_OVPN_CONFIG }}" > /tmp/htb.ovpn
          sudo openvpn --config /tmp/htb.ovpn --daemon --log /tmp/openvpn.log
          # Wait for tun0 to come up
          for i in $(seq 1 30); do
            if ip addr show tun0 2>/dev/null | grep -q "inet "; then
              echo "VPN connected on tun0"
              ip addr show tun0
              break
            fi
            sleep 2
          done
          if ! ip addr show tun0 2>/dev/null | grep -q "inet "; then
            echo "::error::VPN failed to connect within 60s"
            cat /tmp/openvpn.log
            exit 1
          fi

      - name: Run HTB Starting Point benchmark
        run: |
          LIMIT="${{ inputs.limit || '25' }}"
          START="${{ inputs.start || '0' }}"
          ONLY="${{ inputs.only || '' }}"
          TIER="${{ inputs.tier || '' }}"
          RETRIES="${{ inputs.retries || '3' }}"
          FRESH="${{ inputs.fresh || 'true' }}"
          FLAGS=""
          if [ "$START" != "0" ]; then FLAGS="$FLAGS --start $START"; fi
          if [ -n "$ONLY" ]; then FLAGS="$FLAGS --only $ONLY"; fi
          if [ -n "$TIER" ]; then FLAGS="$FLAGS --tier $TIER"; fi
          if [ "$FRESH" = "true" ]; then FLAGS="$FLAGS --fresh"; fi
          echo "Running HTB Starting Point benchmark... (limit=$LIMIT, retries=$RETRIES $FLAGS)"
          pnpm --filter @pwnkit/benchmark htb --save-findings --limit "$LIMIT" --retries "$RETRIES" $FLAGS
        timeout-minutes: 330

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: htb-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            packages/benchmark/results/htb-latest.json
            packages/benchmark/results/htb-incremental.jsonl

      - name: Post summary
        if: always()
        run: |
          RESULTS="packages/benchmark/results/htb-latest.json"
          if [ ! -f "$RESULTS" ]; then
            echo "### HTB Starting Point Benchmark" >> "$GITHUB_STEP_SUMMARY"
            echo "No results file produced." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          TOTAL=$(jq '.results | length' "$RESULTS")
          FLAGS=$(jq '[.results[] | select(.flagSubmitted == true)] | length' "$RESULTS")
          SPAWNED=$(jq '[.results[] | select(.error == null or (.error | startswith("Spawn") | not))] | length' "$RESULTS")
          SPAWN_FAIL=$((TOTAL - SPAWNED))
          echo "### HTB Starting Point Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total machines | $TOTAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Flags submitted | $FLAGS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Spawn failures | $SPAWN_FAIL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Score (flags / spawned)** | **$FLAGS / $SPAWNED** |" >> "$GITHUB_STEP_SUMMARY"
