name: HackTheBox Challenges Benchmark

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of challenges to run'
        required: false
        default: '50'
      start:
        description: 'Start offset (skip first N challenges)'
        required: false
        default: '0'
      only:
        description: 'Comma-separated challenge names'
        required: false
        default: ''
      category:
        description: 'Filter by category (e.g. "web", "web,crypto"). Leave empty for all.'
        required: false
        default: 'web'
      difficulty:
        description: 'Filter by difficulty (e.g. "easy", "easy,medium"). Leave empty for all.'
        required: false
        default: 'easy'
      challenge_type:
        description: 'Filter by type: static, dynamic, or empty for all.'
        required: false
        default: ''
      retries:
        description: 'Retry count per challenge'
        required: false
        default: '2'
      fresh:
        description: 'Start from a clean results file instead of merging'
        required: false
        default: 'true'

jobs:
  htb-challenges:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      HTB_API_TOKEN: ${{ secrets.HTB_API_TOKEN }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_BASE_URL: ${{ secrets.AZURE_OPENAI_BASE_URL }}
      AZURE_OPENAI_MODEL: ${{ secrets.AZURE_OPENAI_MODEL }}
      AZURE_OPENAI_WIRE_API: ${{ secrets.AZURE_OPENAI_WIRE_API }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: corepack enable && corepack prepare pnpm@9 --activate

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Install pentest tools
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            nmap nikto sqlmap \
            gobuster dirb ffuf \
            hydra john \
            whatweb wafw00f \
            netcat-openbsd dnsutils \
            python3-pip python3-requests \
            unzip jq seclists 2>/dev/null || echo "Some packages failed"

          pip3 install --quiet --break-system-packages \
            requests beautifulsoup4 lxml \
            pwntools paramiko 2>/dev/null || echo "Some Python packages failed"

      - name: Connect to HTB VPN (dynamic challenges only)
        run: |
          if [ -z "${{ secrets.HTB_OVPN_CONFIG }}" ]; then
            echo "::warning::HTB_OVPN_CONFIG secret not set — VPN connection skipped."
            echo "Dynamic challenges may not be reachable without VPN."
            exit 0
          fi
          sudo apt-get install -y -qq openvpn
          echo "${{ secrets.HTB_OVPN_CONFIG }}" > /tmp/htb.ovpn
          sudo openvpn --config /tmp/htb.ovpn --daemon --log /tmp/openvpn.log
          for i in $(seq 1 30); do
            if ip addr show tun0 2>/dev/null | grep -q "inet "; then
              echo "VPN connected on tun0"
              ip addr show tun0
              break
            fi
            sleep 2
          done
          if ! ip addr show tun0 2>/dev/null | grep -q "inet "; then
            echo "::error::VPN failed to connect within 60s"
            cat /tmp/openvpn.log
            exit 1
          fi

      - name: Run HTB Challenges benchmark
        run: |
          LIMIT="${{ inputs.limit || '50' }}"
          START="${{ inputs.start || '0' }}"
          ONLY="${{ inputs.only || '' }}"
          CATEGORY="${{ inputs.category || 'web' }}"
          DIFFICULTY="${{ inputs.difficulty || 'easy' }}"
          CHALLENGE_TYPE="${{ inputs.challenge_type || '' }}"
          RETRIES="${{ inputs.retries || '2' }}"
          FRESH="${{ inputs.fresh || 'true' }}"
          FLAGS=""
          if [ "$START" != "0" ]; then FLAGS="$FLAGS --start $START"; fi
          if [ -n "$ONLY" ]; then FLAGS="$FLAGS --only $ONLY"; fi
          if [ -n "$CATEGORY" ]; then FLAGS="$FLAGS --category $CATEGORY"; fi
          if [ -n "$DIFFICULTY" ]; then FLAGS="$FLAGS --difficulty $DIFFICULTY"; fi
          if [ -n "$CHALLENGE_TYPE" ]; then FLAGS="$FLAGS --challenge-type $CHALLENGE_TYPE"; fi
          if [ "$FRESH" = "true" ]; then FLAGS="$FLAGS --fresh"; fi
          echo "Running HTB Challenges benchmark... (limit=$LIMIT, retries=$RETRIES $FLAGS)"
          pnpm --filter @pwnkit/benchmark htb:challenges --save-findings --limit "$LIMIT" --retries "$RETRIES" $FLAGS
        timeout-minutes: 330

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: htb-challenges-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            packages/benchmark/results/htb-challenges-latest.json
            packages/benchmark/results/htb-challenges-incremental.jsonl

      - name: Post summary
        if: always()
        run: |
          RESULTS="packages/benchmark/results/htb-challenges-latest.json"
          if [ ! -f "$RESULTS" ]; then
            echo "### HTB Challenges Benchmark" >> "$GITHUB_STEP_SUMMARY"
            echo "No results file produced." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          TOTAL=$(jq '.results | length' "$RESULTS")
          FLAGS=$(jq '[.results[] | select(.flagSubmitted == true)] | length' "$RESULTS")
          ERRORS=$(jq '[.results[] | select(.error != null)] | length' "$RESULTS")
          STARTED=$((TOTAL - ERRORS))
          echo "### HTB Challenges Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total challenges | $TOTAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Flags submitted | $FLAGS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Errors | $ERRORS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Score** | **$FLAGS / $TOTAL** |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          # Category breakdown
          echo "#### By Category" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Category | Flags | Total |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          jq -r '.categoryBreakdown | to_entries | sort_by(-.value.total) | .[] | "| \(.key) | \(.value.flags) | \(.value.total) |"' "$RESULTS" >> "$GITHUB_STEP_SUMMARY"
