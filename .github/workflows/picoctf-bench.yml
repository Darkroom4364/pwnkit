name: picoCTF Benchmark

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of challenges to run'
        required: false
        default: '50'
      start:
        description: 'Start offset (skip first N challenges)'
        required: false
        default: '0'
      only:
        description: 'Comma-separated challenge IDs (e.g. "picogym-obedient-cat,picogym-mod26")'
        required: false
        default: ''
      category:
        description: 'Filter by category (e.g. "web", "cryptography", "forensics")'
        required: false
        default: ''
      retries:
        description: 'Retry count per challenge'
        required: false
        default: '3'
      fresh:
        description: 'Start from a clean picoctf-latest.json instead of merging'
        required: false
        default: 'true'

jobs:
  picoctf:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 360

    env:
      # Azure OpenAI is the primary runtime.
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_BASE_URL: ${{ secrets.AZURE_OPENAI_BASE_URL }}
      AZURE_OPENAI_MODEL: ${{ secrets.AZURE_OPENAI_MODEL }}
      AZURE_OPENAI_WIRE_API: ${{ secrets.AZURE_OPENAI_WIRE_API }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: corepack enable && corepack prepare pnpm@9 --activate

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Install pentest tools
        run: |
          # Playwright for web challenges
          npm install -g playwright 2>/dev/null || true
          playwright install --with-deps chromium 2>/dev/null || echo "Playwright install skipped"

          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            sqlmap nmap nikto \
            gobuster dirb ffuf \
            python3-pip python3-requests \
            jq binutils file xxd \
            radare2 gdb \
            unzip p7zip-full \
            netcat-openbsd \
            seclists 2>/dev/null || echo "Some packages failed"

          pip3 install --quiet --break-system-packages \
            requests beautifulsoup4 lxml \
            pwntools pycryptodome \
            pillow stegoveritas 2>/dev/null || echo "Some Python packages failed"

      - name: Run picoCTF benchmark
        run: |
          LIMIT="${{ inputs.limit || '50' }}"
          START="${{ inputs.start || '0' }}"
          ONLY="${{ inputs.only || '' }}"
          CATEGORY="${{ inputs.category || '' }}"
          RETRIES="${{ inputs.retries || '3' }}"
          FRESH="${{ inputs.fresh || 'true' }}"
          FLAGS=""
          if [ "$START" != "0" ]; then FLAGS="$FLAGS --start $START"; fi
          if [ -n "$ONLY" ]; then FLAGS="$FLAGS --only $ONLY"; fi
          if [ -n "$CATEGORY" ]; then FLAGS="$FLAGS --category $CATEGORY"; fi
          if [ "$FRESH" = "true" ]; then FLAGS="$FLAGS --fresh"; fi
          echo "Running picoCTF benchmark... (limit=$LIMIT, retries=$RETRIES $FLAGS)"
          pnpm --filter @pwnkit/benchmark picoctf --save-findings --limit "$LIMIT" --retries "$RETRIES" $FLAGS
        timeout-minutes: 330

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: picoctf-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            packages/benchmark/results/picoctf-latest.json
            packages/benchmark/results/picoctf-incremental.jsonl

      - name: Post summary
        if: always()
        run: |
          RESULTS="packages/benchmark/results/picoctf-latest.json"
          if [ ! -f "$RESULTS" ]; then
            echo "### picoCTF Benchmark" >> "$GITHUB_STEP_SUMMARY"
            echo "No results file produced." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          TOTAL=$(jq '.results | length' "$RESULTS")
          FLAGS=$(jq '[.results[] | select(.flagFound == true)] | length' "$RESULTS")
          ERRORS=$(jq '[.results[] | select(.error != null)] | length' "$RESULTS")
          echo "### picoCTF Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total challenges | $TOTAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Flags extracted | $FLAGS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Scan errors | $ERRORS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Score** | **$FLAGS / $TOTAL** |" >> "$GITHUB_STEP_SUMMARY"
