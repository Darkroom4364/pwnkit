name: PortSwigger Web Security Academy Benchmark

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of labs to run'
        required: false
        default: '130'
      start:
        description: 'Start offset (skip first N labs)'
        required: false
        default: '0'
      only:
        description: 'Comma-separated lab IDs (URL slugs)'
        required: false
        default: ''
      category:
        description: 'Filter by category (e.g. "SQL injection", "Cross-site scripting")'
        required: false
        default: ''
      difficulty:
        description: 'Filter by difficulty (Apprentice, Practitioner, Expert)'
        required: false
        default: ''
      retries:
        description: 'Retry count per lab'
        required: false
        default: '2'
      fresh:
        description: 'Start from a clean results file instead of merging'
        required: false
        default: 'true'

jobs:
  portswigger:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    env:
      PORTSWIGGER_USERNAME: ${{ secrets.PORTSWIGGER_USERNAME }}
      PORTSWIGGER_PASSWORD: ${{ secrets.PORTSWIGGER_PASSWORD }}
      # Azure OpenAI is the primary runtime.
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_BASE_URL: ${{ secrets.AZURE_OPENAI_BASE_URL }}
      AZURE_OPENAI_MODEL: ${{ secrets.AZURE_OPENAI_MODEL }}
      AZURE_OPENAI_WIRE_API: ${{ secrets.AZURE_OPENAI_WIRE_API }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: corepack enable && corepack prepare pnpm@9 --activate

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Install pentest tools
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            nmap nikto sqlmap \
            gobuster dirb ffuf \
            hydra john \
            whatweb wafw00f \
            netcat-openbsd dnsutils \
            python3-pip python3-requests \
            jq seclists 2>/dev/null || echo "Some packages failed"

          pip3 install --quiet --break-system-packages \
            requests beautifulsoup4 lxml 2>/dev/null || echo "Some Python packages failed"

      - name: Run PortSwigger benchmark
        run: |
          LIMIT="${{ inputs.limit || '130' }}"
          START="${{ inputs.start || '0' }}"
          ONLY="${{ inputs.only || '' }}"
          CATEGORY="${{ inputs.category || '' }}"
          DIFFICULTY="${{ inputs.difficulty || '' }}"
          RETRIES="${{ inputs.retries || '2' }}"
          FRESH="${{ inputs.fresh || 'true' }}"
          FLAGS=""
          if [ "$START" != "0" ]; then FLAGS="$FLAGS --start $START"; fi
          if [ -n "$ONLY" ]; then FLAGS="$FLAGS --only $ONLY"; fi
          if [ -n "$CATEGORY" ]; then FLAGS="$FLAGS --category \"$CATEGORY\""; fi
          if [ -n "$DIFFICULTY" ]; then FLAGS="$FLAGS --difficulty $DIFFICULTY"; fi
          if [ "$FRESH" = "true" ]; then FLAGS="$FLAGS --fresh"; fi
          echo "Running PortSwigger benchmark... (limit=$LIMIT, retries=$RETRIES $FLAGS)"
          eval pnpm --filter @pwnkit/benchmark portswigger --save-findings --limit "$LIMIT" --retries "$RETRIES" $FLAGS
        timeout-minutes: 450

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portswigger-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            packages/benchmark/results/portswigger-latest.json
            packages/benchmark/results/portswigger-incremental.jsonl

      - name: Post summary
        if: always()
        run: |
          RESULTS="packages/benchmark/results/portswigger-latest.json"
          if [ ! -f "$RESULTS" ]; then
            echo "### PortSwigger Web Security Academy Benchmark" >> "$GITHUB_STEP_SUMMARY"
            echo "No results file produced." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          TOTAL=$(jq '.results | length' "$RESULTS")
          SOLVED=$(jq '[.results[] | select(.solved == true)] | length' "$RESULTS")
          PASSED=$(jq '[.results[] | select(.passed == true)] | length' "$RESULTS")
          LAUNCH_FAIL=$(jq '.launchFailures' "$RESULTS")
          echo "### PortSwigger Web Security Academy Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total labs | $TOTAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Solved | $SOLVED |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Passed (w/ findings) | $PASSED |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Launch failures | $LAUNCH_FAIL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Score (solved / total)** | **$SOLVED / $TOTAL** |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### By difficulty" >> "$GITHUB_STEP_SUMMARY"
          echo "| Difficulty | Solved | Total |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------------|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          for DIFF in Apprentice Practitioner Expert; do
            D_TOTAL=$(jq --arg d "$DIFF" '[.results[] | select(.difficulty == $d)] | length' "$RESULTS")
            D_SOLVED=$(jq --arg d "$DIFF" '[.results[] | select(.difficulty == $d and .solved == true)] | length' "$RESULTS")
            echo "| $DIFF | $D_SOLVED | $D_TOTAL |" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### By category" >> "$GITHUB_STEP_SUMMARY"
          echo "| Category | Solved | Total |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          jq -r '[.results[] | {category}] | group_by(.category) | .[] | "\(.[0].category)\t\(length)"' "$RESULTS" | while IFS=$'\t' read -r CAT C_TOTAL; do
            C_SOLVED=$(jq --arg c "$CAT" '[.results[] | select(.category == $c and .solved == true)] | length' "$RESULTS")
            echo "| $CAT | $C_SOLVED | $C_TOTAL |" >> "$GITHUB_STEP_SUMMARY"
          done
