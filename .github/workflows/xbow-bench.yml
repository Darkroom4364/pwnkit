name: XBOW Benchmark

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scan mode: black-box or white-box'
        required: false
        default: 'black-box'
        type: choice
        options:
          - black-box
          - white-box
      limit:
        description: 'Number of challenges to run'
        required: false
        default: '50'
      start:
        description: 'Start offset (skip first N challenges)'
        required: false
        default: '0'
      only:
        description: 'Comma-separated challenge IDs to run (e.g. "XBEN-010,XBEN-051,XBEN-066")'
        required: false
        default: ''
      fresh:
        description: 'Start from a clean xbow-latest.json instead of merging with any checked-in baseline'
        required: false
        default: 'true'
      models:
        description: 'Optional comma-separated OpenRouter models for best-of-N runs'
        required: false
        default: ''
      features:
        description: 'Feature flags: "all" (default), "none" (baseline), or "playbooks,memory" (specific)'
        required: false
        default: 'all'
  schedule:
    # Weekly on Sunday at 04:00 UTC
    - cron: "0 4 * * 0"

jobs:
  xbow:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      XBOW_PATH: /tmp/xbow-benchmarks
      # Azure OpenAI is the primary runtime for XBOW benchmarks.
      # Do NOT set OPENROUTER_API_KEY here — pwnkit prioritizes OpenRouter
      # over Azure when both are present, which would route benchmark
      # traffic to OpenRouter instead of our Azure deployment.
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_BASE_URL: ${{ secrets.AZURE_OPENAI_BASE_URL }}
      AZURE_OPENAI_MODEL: ${{ secrets.AZURE_OPENAI_MODEL }}
      AZURE_OPENAI_WIRE_API: ${{ secrets.AZURE_OPENAI_WIRE_API }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - run: corepack enable && corepack prepare pnpm@9 --activate

      - name: Clone XBOW validation benchmarks (patched fork -- fixes all 104 Docker builds)
        run: git clone --depth 1 https://github.com/0ca/xbow-validation-benchmarks-patched "$XBOW_PATH"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Install pentest tools
        run: |
          # Playwright for XSS challenges (already in CI image but ensure)
          npm install -g playwright 2>/dev/null || true
          playwright install --with-deps chromium 2>/dev/null || echo "Playwright install skipped"

          # Full pentest toolset — give the agent every weapon BoxPwnr has.
          # Installed directly on the Ubuntu runner (no Docker overhead).
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            sqlmap nmap nikto \
            gobuster dirb wfuzz ffuf \
            hydra john hashcat \
            whatweb wafw00f \
            nbtscan smbclient \
            netcat-openbsd dnsutils \
            python3-pip python3-requests \
            jq xmlstarlet \
            seclists 2>/dev/null || echo "Some packages failed (check apt log)"

          # Python tools the agent might use
          pip3 install --quiet --break-system-packages \
            requests beautifulsoup4 lxml \
            paramiko impacket 2>/dev/null || echo "Some Python packages failed"

          # Verify what's available
          echo "=== Installed pentest tools ==="
          for tool in sqlmap nmap nikto gobuster dirb wfuzz ffuf hydra john hashcat whatweb wafw00f curl wget python3 jq; do
            if command -v $tool >/dev/null 2>&1; then
              echo "  ✓ $tool"
            else
              echo "  ✗ $tool (missing)"
            fi
          done

      - name: Configure feature flags
        run: |
          # Profiles:
          #   none          → all flags forced off (true baseline; both
          #                   "stable" features and the always-on triage
          #                   filters are disabled)
          #   default       → no env vars; uses features.ts defaults
          #                   (stable ON, experimental OFF, moat OFF)
          #   experimental  → "default" + the 4 experimental flags ON
          #   moat          → "default" + every v0.6.0 FP-moat layer
          #                   ON (povGate, reachabilityGate, multiModal,
          #                   adversarialDebate, triageMemories,
          #                   egatsTreeSearch, selfConsistencyVerify)
          #   moat-only     → "none" + ONLY the moat layers ON.
          #                   This is the right profile for "does the
          #                   moat help?" because it isolates the moat
          #                   layers from the stable improvements.
          #   no-triage     → "default" but the always-on triage gates
          #                   (holding-it-wrong + evidence_completeness)
          #                   forced OFF. Used to identify which always-on
          #                   filter is suppressing real signal.
          #   all           → DEPRECATED alias for "default"; kept for
          #                   compat with prior dispatches. Logs a warning.
          FEATURES="${{ inputs.features || 'default' }}"
          if [ "$FEATURES" = "none" ]; then
            echo "PWNKIT_FEATURE_EARLY_STOP=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_LOOP_DETECTION=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_CONTEXT_COMPACTION=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_SCRIPT_TEMPLATES=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_DYNAMIC_PLAYBOOKS=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_EXTERNAL_MEMORY=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_HOLDING_IT_WRONG=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_EVIDENCE_GATE=0" >> "$GITHUB_ENV"
            echo "Running with ALL features DISABLED (true baseline, no triage gates)"
          elif [ "$FEATURES" = "default" ] || [ "$FEATURES" = "all" ]; then
            if [ "$FEATURES" = "all" ]; then
              echo "::warning::'features=all' is deprecated; use 'default' or 'moat'. Running with features.ts defaults."
            fi
            echo "Running with features.ts defaults (stable ON, experimental OFF, moat OFF)"
          elif [ "$FEATURES" = "experimental" ]; then
            echo "PWNKIT_FEATURE_DYNAMIC_PLAYBOOKS=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_EXTERNAL_MEMORY=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_PROGRESS_HANDOFF=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_WEB_SEARCH=1" >> "$GITHUB_ENV"
            echo "Running with default + experimental features"
          elif [ "$FEATURES" = "moat" ]; then
            echo "PWNKIT_FEATURE_POV_GATE=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_REACHABILITY_GATE=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_MULTIMODAL=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_DEBATE=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_TRIAGE_MEMORIES=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_EGATS=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_CONSENSUS_VERIFY=1" >> "$GITHUB_ENV"
            echo "Running with default features + ALL v0.6.0 FP moat layers ON"
          elif [ "$FEATURES" = "moat-only" ]; then
            # Stable features OFF (matches "none")
            echo "PWNKIT_FEATURE_EARLY_STOP=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_LOOP_DETECTION=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_CONTEXT_COMPACTION=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_SCRIPT_TEMPLATES=0" >> "$GITHUB_ENV"
            # Moat layers ON
            echo "PWNKIT_FEATURE_POV_GATE=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_REACHABILITY_GATE=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_MULTIMODAL=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_DEBATE=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_TRIAGE_MEMORIES=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_EGATS=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_CONSENSUS_VERIFY=1" >> "$GITHUB_ENV"
            echo "Running with ONLY the v0.6.0 FP moat layers (isolation test)"
          elif [ "$FEATURES" = "no-triage" ]; then
            echo "PWNKIT_FEATURE_HOLDING_IT_WRONG=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_EVIDENCE_GATE=0" >> "$GITHUB_ENV"
            echo "Running with default features but always-on triage gates DISABLED"
          else
            for f in $(echo "$FEATURES" | tr ',' ' '); do
              case "$f" in
                playbooks) echo "PWNKIT_FEATURE_DYNAMIC_PLAYBOOKS=1" >> "$GITHUB_ENV" ;;
                memory) echo "PWNKIT_FEATURE_EXTERNAL_MEMORY=1" >> "$GITHUB_ENV" ;;
                web_search) echo "PWNKIT_FEATURE_WEB_SEARCH=1" >> "$GITHUB_ENV" ;;
                handoff) echo "PWNKIT_FEATURE_PROGRESS_HANDOFF=1" >> "$GITHUB_ENV" ;;
                pov) echo "PWNKIT_FEATURE_POV_GATE=1" >> "$GITHUB_ENV" ;;
                reachability) echo "PWNKIT_FEATURE_REACHABILITY_GATE=1" >> "$GITHUB_ENV" ;;
                multimodal) echo "PWNKIT_FEATURE_MULTIMODAL=1" >> "$GITHUB_ENV" ;;
                debate) echo "PWNKIT_FEATURE_DEBATE=1" >> "$GITHUB_ENV" ;;
                memories) echo "PWNKIT_FEATURE_TRIAGE_MEMORIES=1" >> "$GITHUB_ENV" ;;
                egats) echo "PWNKIT_FEATURE_EGATS=1" >> "$GITHUB_ENV" ;;
                consensus) echo "PWNKIT_FEATURE_CONSENSUS_VERIFY=1" >> "$GITHUB_ENV" ;;
                no-hiw) echo "PWNKIT_FEATURE_HOLDING_IT_WRONG=0" >> "$GITHUB_ENV" ;;
                no-evidence) echo "PWNKIT_FEATURE_EVIDENCE_GATE=0" >> "$GITHUB_ENV" ;;
              esac
            done
            echo "Running with features: $FEATURES"
          fi

      - name: Run XBOW benchmark
        run: |
          MODE="${{ inputs.mode || 'black-box' }}"
          LIMIT="${{ inputs.limit || '50' }}"
          START="${{ inputs.start || '0' }}"
          ONLY="${{ inputs.only || '' }}"
          FRESH="${{ inputs.fresh || 'true' }}"
          MODELS="${{ inputs.models || '' }}"
          START_FLAG=""
          ONLY_FLAG=""
          FRESH_FLAG=""
          MODELS_FLAG=""
          if [ "$START" != "0" ]; then
            START_FLAG="--start $START"
          fi
          if [ -n "$ONLY" ]; then
            ONLY_FLAG="--only $ONLY"
          fi
          if [ "$FRESH" = "true" ]; then
            FRESH_FLAG="--fresh"
          fi
          if [ -n "$MODELS" ]; then
            MODELS_FLAG="--runtime api --models $MODELS"
          fi
          if [ "$MODE" = "white-box" ]; then
            echo "Running WHITE-BOX benchmark... (start=$START, limit=$LIMIT, only=$ONLY, fresh=$FRESH, models=$MODELS)"
            pnpm --filter @pwnkit/benchmark xbow --agentic --white-box --save-findings --limit "$LIMIT" --retries 3 $START_FLAG $ONLY_FLAG $FRESH_FLAG $MODELS_FLAG
          else
            echo "Running BLACK-BOX benchmark... (start=$START, limit=$LIMIT, only=$ONLY, fresh=$FRESH, models=$MODELS)"
            pnpm --filter @pwnkit/benchmark xbow --agentic --save-findings --limit "$LIMIT" --retries 3 $START_FLAG $ONLY_FLAG $FRESH_FLAG $MODELS_FLAG
          fi
        timeout-minutes: 330

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xbow-results-${{ inputs.mode || 'black-box' }}-${{ inputs.features || 'all' }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: packages/benchmark/results/xbow-latest.json

      - name: Generate triage dataset artifact
        if: always()
        run: |
          RESULTS="packages/benchmark/results/xbow-latest.json"
          OUTPUT="packages/benchmark/results/triage-data-latest.jsonl"
          if [ -f "$RESULTS" ]; then
            pnpm --filter @pwnkit/benchmark triage-data --results "$RESULTS" --output "$OUTPUT" || true
          fi

      - name: Upload triage dataset artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xbow-triage-data-${{ inputs.mode || 'black-box' }}-${{ inputs.features || 'all' }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: packages/benchmark/results/triage-data-latest.jsonl
          if-no-files-found: ignore

      - name: Post summary
        if: always()
        run: |
          MODE="${{ inputs.mode || 'black-box' }}"
          RESULTS="packages/benchmark/results/xbow-latest.json"
          TRIAGE="packages/benchmark/results/triage-data-latest.jsonl"
          if [ ! -f "$RESULTS" ]; then
            echo "### XBOW Benchmark ($MODE)" >> "$GITHUB_STEP_SUMMARY"
            echo "No results file produced." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          TOTAL=$(jq '.results | length' "$RESULTS")
          FLAGS=$(jq '[.results[] | select(.flagFound == true)] | length' "$RESULTS")
          BUILT=$(jq '[.results[] | select(.error == null or .error == "")] | length' "$RESULTS")
          BUILD_FAIL=$((TOTAL - BUILT))
          echo "### XBOW Benchmark Results ($MODE)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total challenges | $TOTAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Flags extracted | $FLAGS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker build failures | $BUILD_FAIL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Score (flags / buildable)** | **$FLAGS / $BUILT** |" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "$TRIAGE" ]; then
            TRIAGE_ROWS=$(wc -l < "$TRIAGE" | tr -d ' ')
            echo "| Triage samples emitted | $TRIAGE_ROWS |" >> "$GITHUB_STEP_SUMMARY"
          fi
